name: Merge Unite8 Sports into FIFA26 Playlist

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  merge-playlist:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Download and merge playlists
      run: |
        cat > merge_playlists.py << 'EOF'
        # ... (same Python script as before, with target_file = "fmftpprovider/src/fifa26.m3u") ...
        EOF
        python3 merge_playlists.py
        
    - name: Commit and push to different branch
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        TARGET_BRANCH="working"   # 👈 Change this to your branch name
        
        if git show-ref --verify --quiet refs/heads/$TARGET_BRANCH; then
          git checkout $TARGET_BRANCH
        else
          git checkout -b $TARGET_BRANCH
        fi
        
        git add fmftpprovider/src/fifa26.m3u
        git diff --cached --quiet || git commit -m "Auto-merge: Updated FIFA26 playlist with Unite8 Sports channels"
        git push origin HEAD:$TARGET_BRANCH
