name: Merge FIFA26 Group Only into Playlist (Top) - Fixed Logo

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  merge-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Download and merge playlists
        run: |
          cat > merge_playlists.py << 'EOF'
          import urllib.request
          import os
          import re
          import sys

          # ===== CONFIGURATION =====
          source_url = "https://bonobo.live/channels.m3u"
          target_file = "fmftpprovider/src/fifa26.m3u"
          FILTER_GROUP_TITLE = "FIFA26"
          FIXED_LOGO_URL = "https://raw.githubusercontent.com/mpshimul/hub2stream/main/fifa26.webp"
          # =========================

          def fix_m3u_content(raw_content):
              """Clean up raw M3U content: remove stray 'URL:' lines and fix line breaks."""
              lines = raw_content.split('\n')
              cleaned = []
              for line in lines:
                  if line.strip().startswith("URL:"):
                      continue
                  if "#EXTM3U" in line and "#EXTINF" in line:
                      parts = re.split(r'(#EXTINF)', line)
                      for part in parts:
                          if part.strip():
                              cleaned.append(part.strip())
                  else:
                      cleaned.append(line)
              content = '\n'.join(cleaned)
              content = re.sub(r'\n\s*\n', '\n', content)
              return content.strip()

          def ensure_extm3u_header(content):
              """Ensure the playlist has an '#EXTM3U' header at the top."""
              if not content.strip().startswith('#EXTM3U'):
                  return "#EXTM3U\n" + content
              return content

          def filter_by_group_title(entries, group_title):
              """Filter a list of (extinf, url) tuples by group-title attribute."""
              pattern = f'group-title="{re.escape(group_title)}"'
              filtered = []
              for extinf, url in entries:
                  if re.search(pattern, extinf):
                      filtered.append((extinf, url))
                      print(f"Keeping channel with group {group_title}: {extinf}")
                  else:
                      print(f"Skipping channel (group not {group_title}): {extinf}")
              return filtered

          def replace_tvg_logo(extinf, fixed_logo_url):
              """
              Replace any existing tvg-logo value with fixed_logo_url.
              If tvg-logo does not exist, insert it before the channel name.
              """
              # Pattern to match tvg-logo="anything" or tvg-logo='anything'
              pattern = r'(tvg-logo=["\'])([^"\']*)(["\'])'
              if re.search(pattern, extinf):
                  # Replace existing logo
                  new_extinf = re.sub(pattern, rf'\1{fixed_logo_url}\3', extinf)
                  print(f"  Replaced logo: {extinf} -> {new_extinf}")
                  return new_extinf
              else:
                  # Insert tvg-logo before the channel name (the comma)
                  # Find the last comma that separates attributes from channel name
                  # Usually format: #EXTINF:-1 attribute1="value" attribute2="value", Channel Name
                  # We insert tvg-logo="url" before that comma
                  comma_pos = extinf.rfind(',')
                  if comma_pos != -1:
                      new_extinf = extinf[:comma_pos] + f' tvg-logo="{fixed_logo_url}"' + extinf[comma_pos:]
                  else:
                      # Fallback: append at the end (should not happen)
                      new_extinf = extinf + f' tvg-logo="{fixed_logo_url}"'
                  print(f"  Added logo: {extinf} -> {new_extinf}")
                  return new_extinf

          def extract_entries(content):
              """Return list of (extinf, url) tuples from M3U content (excluding header)."""
              entries = []
              lines = content.split('\n')
              i = 0
              while i < len(lines):
                  line = lines[i]
                  if line.strip().startswith('#EXTINF'):
                      extinf = line
                      url_line = lines[i+1] if i+1 < len(lines) else ''
                      if url_line and not url_line.startswith('#'):
                          entries.append((extinf, url_line))
                      i += 2
                  else:
                      i += 1
              return entries

          def prepend_unique_entries(target_entries, source_entries):
              """
              Prepend source entries to target if they are not already present.
              Returns new list of entries with source (new only) first, then target.
              """
              target_urls = {url.strip() for _, url in target_entries}
              new_entries = []
              for extinf, url in source_entries:
                  if url.strip() not in target_urls:
                      new_entries.append((extinf, url))
                      target_urls.add(url.strip())
                      print(f"Adding new (at top): {extinf}")
              if not new_entries:
                  print("No new entries to add.")
                  return target_entries
              return new_entries + target_entries

          def entries_to_m3u(entries):
              """Convert list of (extinf, url) back to M3U string with header."""
              lines = ["#EXTM3U"]
              for extinf, url in entries:
                  lines.append(extinf)
                  lines.append(url)
              return '\n'.join(lines)

          # ===== MAIN =====
          print("Downloading source playlist...")
          try:
              with urllib.request.urlopen(source_url) as resp:
                  raw = resp.read().decode('utf-8')
                  print(f"Downloaded {len(raw)} bytes")
          except Exception as e:
              print(f"Download error: {e}")
              sys.exit(1)

          source_clean = fix_m3u_content(raw)
          source_clean = ensure_extm3u_header(source_clean)
          all_source_entries = extract_entries(source_clean)

          # Filter source entries by group-title
          source_entries_filtered = filter_by_group_title(all_source_entries, FILTER_GROUP_TITLE)

          if not source_entries_filtered:
              print(f"No entries found with group-title=\"{FILTER_GROUP_TITLE}\". Exiting without changes.")
              sys.exit(0)

          # Replace tvg-logo in each filtered source entry
          source_entries_with_fixed_logo = []
          for extinf, url in source_entries_filtered:
              new_extinf = replace_tvg_logo(extinf, FIXED_LOGO_URL)
              source_entries_with_fixed_logo.append((new_extinf, url))

          # Load target file
          if os.path.exists(target_file):
              with open(target_file, 'r', encoding='utf-8') as f:
                  target_content = f.read()
              print(f"Target {target_file} loaded ({len(target_content)} chars)")
          else:
              print(f"Target {target_file} not found, creating new.")
              target_content = "#EXTM3U\n"

          target_clean = ensure_extm3u_header(target_content)
          target_entries = extract_entries(target_clean)

          # Merge (prepend filtered and logo-fixed source entries)
          merged_entries = prepend_unique_entries(target_entries, source_entries_with_fixed_logo)
          merged_content = entries_to_m3u(merged_entries)

          with open(target_file, 'w', encoding='utf-8') as f:
              f.write(merged_content)

          print(f"Merge completed. Updated {target_file} (only group {FILTER_GROUP_TITLE} entries prepended with fixed logo).")
          EOF

          python3 merge_playlists.py

      - name: Commit and push to different branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          TARGET_BRANCH="working"
          
          git fetch origin $TARGET_BRANCH
          
          if git show-ref --verify --quiet refs/heads/$TARGET_BRANCH; then
            git checkout $TARGET_BRANCH
          else
            git checkout -b $TARGET_BRANCH
          fi
          
          git add fmftpprovider/src/fifa26.m3u
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-merge: Prepended FIFA26-group channels with fixed logo"
            git push --force-with-lease origin HEAD:$TARGET_BRANCH
          fi
